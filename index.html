<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRM CGPA Calculator</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1d2671,#c33764);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.card{
    width:420px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border-radius:18px;
    padding:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    margin-bottom:5px;
}

.creator{
    text-align:center;
    font-size:14px;
    opacity:0.85;
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#00e5ff;
    border:none;
    border-radius:10px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00bcd4;
}

.subject{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.result{
    margin-top:20px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
    <h1>SRM CGPA Calculator</h1>
    <div class="creator">
        Made by <b>PRAVEEN KUMAR</b><br>
        Register No: <b>RA2511003010461</b>
    </div>

    <input type="number" id="count" placeholder="Enter number of subjects" min="1">

    <button onclick="createSubjects()">Add Subjects</button>

    <div id="subjects"></div>

    <button onclick="calculateCGPA()">Calculate CGPA</button>

    <div class="result" id="result"></div>
</div>

<script>
const gradePoints = {
    "O":10,
    "A+":9,
    "A":8,
    "B+":7,
    "B":6,
    "C":5,
    "F":0
};

function createSubjects(){
    const n = document.getElementById("count").value;
    const container = document.getElementById("subjects");
    container.innerHTML = "";

    if(n <= 0){
        alert("Enter valid number of subjects");
        return;
    }

    for(let i=1;i<=n;i++){
        container.innerHTML += `
        <div class="subject">
            <select id="grade${i}">
                <option value="">Grade (Sub ${i})</option>
                <option>O</option>
                <option>A+</option>
                <option>A</option>
                <option>B+</option>
                <option>B</option>
                <option>C</option>
                <option>F</option>
            </select>

            <input type="number" id="credit${i}" placeholder="Credits" min="1">
        </div>`;
    }
}

function calculateCGPA(){
    const n = document.getElementById("count").value;
    let totalCredits = 0;
    let weightedSum = 0;

    for(let i=1;i<=n;i++){
        const grade = document.getElementById(`grade${i}`).value;
        const credit = parseFloat(document.getElementById(`credit${i}`).value);

        if(!grade || isNaN(credit)){
            alert("Fill grade & credit for all subjects");
            return;
        }

        weightedSum += gradePoints[grade] * credit;
        totalCredits += credit;
    }

    const cgpa = (weightedSum / totalCredits).toFixed(2);
    document.getElementById("result").innerHTML = `Your CGPA is <br> ⭐ <b>${cgpa}</b>`;
}
</script>

</body>
</html>
